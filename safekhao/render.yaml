services:
  - type: web
    name: safekhao
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
